name: Python smoke (self-hosted)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Python smoke (self-hosted)
    runs-on: [self-hosted, sample-brain]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile core modules
        run: python -m py_compile src/analyze.py src/cli.py

      - name: Check CLI help
        run: python -m src.cli --help
