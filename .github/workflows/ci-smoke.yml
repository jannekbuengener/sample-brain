name: Python smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: Python smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile core modules
        run: python -m py_compile src/analyze.py src/cli.py

      - name: Check CLI help
        run: python -m src.cli --help
